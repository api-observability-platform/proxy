syntax = "proto3";
package proxyforward;

// Wrapper for unary gRPC forwarding through the proxy gateway.
message ForwardRequest {
  string slug = 1;
  string grpc_method = 2;
  map<string, string> metadata = 3;
  bytes message = 4;
}

message ForwardReply {
  bytes message = 1;
  int32 grpc_status = 2;
  string error_message = 3;
}

service ProxyForward {
  rpc Unary (ForwardRequest) returns (ForwardReply);
}
